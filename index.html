<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/Favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b0b2c" />

    <!-- Mobile performance optimizations -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Critical meta tags for SEO and performance -->
    <meta name="description" content="Wixwave is a leading web and mobile app development agency in India. We deliver high-performance websites, SEO, and digital experiences that drive growth." />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />
    <meta name="googlebot" content="index, follow" />

    <!-- Open Graph meta tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="WixWave | The Digital Solutions" />
    <meta property="og:description" content="Wixwave empowers businesses in Gurgaon and Patna with expert web design, app development, SEO, branding, and digital marketing." />
    <meta property="og:image" content="https://res.cloudinary.com/dobbdtftp/image/upload/v1746202311/3_rgrvsx.png" />
    <meta property="og:url" content="https://wixwave.co/" />
    <meta property="og:site_name" content="WixWave" />

    <!-- Twitter Card meta tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WixWave | The Digital Solutions" />
    <meta name="twitter:description" content="Wixwave empowers businesses in Gurgaon and Patna with expert web design, app development, SEO, branding, and digital marketing." />
    <meta name="twitter:image" content="https://res.cloudinary.com/dobbdtftp/image/upload/v1746202311/3_rgrvsx.png" />

    <!-- DNS prefetch for external domains to establish early connections -->
    <link rel="dns-prefetch" href="https://res.cloudinary.com" />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />

    <!-- Preconnect to critical third-party origins -->
    <link rel="preconnect" href="https://res.cloudinary.com" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Preload critical resources -->
    <link rel="preload" as="image" href="https://res.cloudinary.com/dobbdtftp/image/upload/v1746202311/3_rgrvsx.png" fetchpriority="high">

    <!-- Preload critical font for LCP -->
    <link rel="preload" as="font" type="font/woff2" href="https://fonts.gstatic.com/s/josefinsans/v32/Qw3aZQNVED7rKGKxtqIqX5EUDXx9.ttf" crossorigin>

    <!-- Load Google Fonts asynchronously to avoid render blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap" media="print" onload="this.media='all'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Josefin+Sans:ital,wght@0,100..700;1,100..700&display=swap"></noscript>

    <title>WixWave | The Digital Solutions</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
